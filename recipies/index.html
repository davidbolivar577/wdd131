<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipies</title>
    <meta name="author" content="David Bolivar">
    <meta name="description" content="Recipies">



    <script defer src="recipies.js"></script>
    <link href="recipies.css" rel="stylesheet">
</head>

<body>
    <main>
        <h1>
            <img src="images/recipe-book.png" alt="logo">
            RecipeBook
        </h1>
        <div class="search">
            <input type="text" placeholder="Search..">
            <img id="search-button" src="images/search.svg" alt="search-button" aria-hidden="true">
        </div>
        <hr>

        <div class="recipies">
            <img class="image" src="images/apple-crisp.jpg" alt="Apple Crisp">
            <span class="category">
                dessert
            </span>
            <span class="name">
                Apple Crisp
            </span>

            <span class="rating" role="img" aria-label="Rating: 4 out of 5 stars">
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star-empty">☆</span>
            </span>
            <span class="description">This apple crisp recipe is a simple yet delicious fall dessert that's great served warm with vanilla ice cream.</span>
        </div>
    </main>
    <footer>
        <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">Recipe icons created by Freepik -
            Flaticon</a>

        <div class="social">
            <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates  -->
            <a href="#"><img src="images/instagram_icon.svg" alt="instagram icon"></a>
            <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon"></a>
            <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon"></a>
        </div>

    </footer>
</body>
